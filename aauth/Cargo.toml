[package]
name = "aauth"
version = "0.0.3"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
description = "Rust implementation of the AAuth authorization protocol"
documentation = "https://docs.rs/aauth"
readme = "../README.md"
keywords = ["aauth", "oauth", "authentication", "http-signatures"]
categories = ["authentication", "web-programming"]

[features]
default = [
    "agent",
    "agent-reqwest",
    "agent-reqwest-verify",
    "person-server",
    "access-server",
    "resource",
]

# --- Agent ---
agent = []
agent-reqwest = [
    "agent",
    "dep:reqwest",
    "dep:reqwest-middleware",
    "dep:http-body-util",
    "dep:tokio",
]
agent-reqwest-verify = ["agent-reqwest", "resource-verify"]

# --- Shared server infrastructure ---
deferred = []
policy = ["deferred"]
deferred-http = ["deferred", "dep:reqwest", "dep:tokio"]

# --- Resource token verification (no RS service/layer) ---
resource-verify = []

# --- Protocol roles ---
person-server = [
    "deferred",
    "policy",
    "resource-verify",
    "deferred-http",
]
access-server = ["deferred", "policy"]
resource = ["deferred", "policy", "resource-verify"]

# --- Convenience meta-features ---
server = ["person-server", "access-server", "resource"]
full = [
    "agent",
    "agent-reqwest",
    "agent-reqwest-verify",
    "server",
]

[dependencies]
async-trait.workspace = true
base64.workspace = true
bytes.workspace = true
ed25519-dalek.workspace = true
http.workspace = true
jsonwebtoken.workspace = true
rand.workspace = true
anyhow.workspace = true
reqwest = { workspace = true, optional = true }
reqwest-middleware = { workspace = true, optional = true }
http-body-util = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
sfv.workspace = true
sha2.workspace = true
thiserror.workspace = true
tokio = { workspace = true, optional = true, features = ["time"] }
url.workspace = true
uuid.workspace = true

[dev-dependencies]
tokio.workspace = true
wiremock.workspace = true
reqwest.workspace = true
reqwest-middleware.workspace = true
http-body-util.workspace = true
anyhow.workspace = true
async-trait.workspace = true
serde_json.workspace = true
rstest.workspace = true

[package.metadata.docs.rs]
all-features = true
